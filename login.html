<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sábio Quiz – Login</title>
     <link rel="stylesheet" href="style.css">  
</head>
<body>

    <header id="cabecalho">
        <h1>Sábio Quiz</h1>
    </header>

    <nav id="menu-horizontal">
        <ul>
            <li><a href="index.html">Menu</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="cadastro.html">Cadastro</a></li>
            <li><a href="scores.html">Scores</a></li>
            <li><a href="gerenciamento.html">Questões</a></li>
        </ul>
    </nav>

    <div id="fundoimg">
        <main id="conteudo-principal">
            <div class="cartao">
                <div class="icone-lock"></div>
                <h2 class="cartao-titulo">Entrar na conta</h2>
                <p class="cartao-subtitulo">Bem-vindo de volta! Acesse sua conta para continuar jogando.</p>

                <form id="formLogin">
                    <div class="campo">
                        <label for="usuario">Usuário</label>
                        <input type="text" id="usuario" placeholder="Ex: joao456_">
                        <span id="usuarioErro" class="erro-mensagem"
                        style="color:red;font-size:14px;"></span>
                    </div>
                    <div class="campo">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" placeholder="Digite sua senha">
                        <span id="senhaErro" class="erro-mensagem"
                        style="color:red;font-size:14px;"></span>
                    </div>
                    <button type="submit" class="btn-primario">Entrar</button>
                </form>

                <div class="link-rodape">
                    Não tem conta? <a href="cadastro.html">Cadastre-se aqui</a>
                </div>
            </div>
        </main>
    </div>

    <footer id="rodape">
        <p><strong>&copy; 2026 – Sábio Quiz</strong></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
