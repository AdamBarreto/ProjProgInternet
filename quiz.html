<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sábio Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!--Página a ser alterada !!!-->
<!----------------------------->


    <header id="cabecalho">
        <h1>Sábio Quiz</h1> <!--estilizar o cabeçalho-->
    </header>

    <nav id="menu-horizontal">
        <ul>
             <li><a href="index.html">Menu</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="cadastro.html">Cadastro</a></li>
            <li><a href="desempenho.html">Desempenho</a></li>
            <li><a href="gerenciamento.html">Questões</a></li>
        </ul>
    </nav>

    <div id="fundoimg">
        <main id="conteudo-principal">
            <form id="formQuiz">
                
                <article class="cartao">
                    <div class="alternativas">
                        <h2 id="qu">Questão 1</h2>
                        <h3 id="questao">Qual é a capital do Brasil?</h3>

                        <input type="radio" name="questao1" id="q1-a" value="a" class="radio-oculto">
                        <label for="q1-a" class="alter alt-a">A) Rio de Janeiro</label>

                        <input type="radio" name="questao1" id="q1-b" value="b" class="radio-oculto">
                        <label for="q1-b" class="alter alt-b">B) São Paulo</label>

                        <input type="radio" name="questao1" id="q1-c" value="c" class="radio-oculto">
                        <label for="q1-c" class="alter alt-c">C) Brasília</label>

                        <input type="radio" name="questao1" id="q1-d" value="d" class="radio-oculto">
                        <label for="q1-d" class="alter alt-d">D) Salvador</label>
                    </div>
                </article>

                <article class="cartao">
                    <div class="alternativas">
                        <h2 id="qu">Questão 2</h2>
                        <h3 id="questao">Em qual esporte são usadas essas luvas? </h3>
                        
                        
                        <img src="Midia/hoquei.png" alt="Equipamento de Hóquei" class="imagem-quiz" style="width: 70%;">
                        

                        <input type="radio" name="questao2" id="q2-a" value="a" class="radio-oculto">
                        <label for="q2-a" class="alter alt-a">A) Grilo</label>

                        <input type="radio" name="questao2" id="q2-b" value="b" class="radio-oculto">
                        <label for="q2-b" class="alter alt-b">B) Pólo</label>

                        <input type="radio" name="questao2" id="q2-c" value="c" class="radio-oculto">
                        <label for="q2-c" class="alter alt-c">C) Hóquei</label>

                        <input type="radio" name="questao2" id="q2-d" value="d" class="radio-oculto">
                        <label for="q2-d" class="alter alt-d">D) Boxe</label>
                    </div>
                </article>

                <article class="cartao">
                    <div class="alternativas">
                        <h2 id="qu">Questão 3 </h2>
                        <h3 id="questao">Plutão é um planeta anão.</h3>
                        <input type="radio" name="questao3" id="q3-a" value="a" class="radio-oculto">
                        <label for="q3-a" class="alter alt-a">A) Verdadeiro</label>

                        <input type="radio" name="questao3" id="q3-b" value="b" class="radio-oculto">
                        <label for="q3-b" class="alter alt-b">B) Falso</label>
                    </div>
                </article>

                <div class="container-botoes-form" style="margin-top: 20px;">
                    <button type="submit" class="btn-primario" style="width: 100%; text-align: center;">Submeter</button>
                </div>
            </form>
        </main>
    </div>

    <footer id="rodape">
        <p><strong>&copy; 2026 - Sábio Quiz</strong></p>
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
