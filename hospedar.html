<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sábio Quiz – Hospedar Partida</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="cabecalho">
        <h1>Sábio Quiz</h1>
    </header>

    <nav id="menu-horizontal">
        <ul>
            <li><a href="index.html">Menu</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="cadastro.html">Cadastro</a></li>
            <li><a href="desempenho.html">Desempenho</a></li>
            <li><a href="gerenciamento.html">Questões</a></li>
        </ul>
    </nav>

    <div id="fundoimg">
        <main id="conteudo-principal">

            <div class="cartao">
                <h2 class="cartao-titulo">Hospedar uma Partida</h2>
                <p class="cartao-subtitulo">Escolha um quiz e crie uma sala em tempo real para os alunos jogarem.</p>

                <form id="formHospedar">
                    <div class="campo">
                        <label for="selecionar-quiz">Selecione o Quiz / Questionário</label>
                        <select id="selecionar-quiz" class="input-estilizado" style="width: 100%; padding: 12px; border-radius: 6px; border: 2px solid #e1d5f5; font-size: 16px;">
                            <option value="1">Conhecimentos Gerais (Capitais, História e Ciências)</option>
                            <option value="2">História – Segunda Guerra Mundial</option>
                            <option value="3">Geografia – Planetas do Sistema Solar</option>
                        </select>
                    </div>

                    <div class="campo">
                        <label for="tempo-questao">Tempo limite por questão</label>
                        <select id="tempo-questao" class="input-estilizado" style="width: 100%; padding: 12px; border-radius: 6px; border: 2px solid #e1d5f5; font-size: 16px;">
                            <option value="10">10 segundos</option>
                            <option value="20" selected>20 segundos</option>
                            <option value="30">30 segundos</option>
                            <option value="60">1 minuto</option>
                        </select>
                    </div>

                    <div class="campo">
                        <label for="qtd-questao">Quantidade de Questões</label>
                        <select id="qtd-questao" class="input-estilizado" style="width: 100%; padding: 12px; border-radius: 6px; border: 2px solid #e1d5f5; font-size: 16px;">
                            <option value="" disabled selected>Selecione uma opção</option>
                            <option value="5">5 questões</option>
                            <option value="7">7 questões</option>
                            <option value="10">10 questões</option>
                            <option value="12">12 questões</option>
                        </select>
                    </div>

                    <div class="campo" id="container-questoes">
                    <!-- Espaço das questões onde o JavaScript vai injetar -->
                    </div>

                    <div class="container-botoes-form" style="margin-top: 20px;">
                        <button type="submit" class="btn-primario" style="width: 100%; text-align: center;">Criar Sala de Jogo</button>
                    </div>
                </form>
            </div>

        </main>
    </div>

    <footer id="rodape">
        <p><strong>&copy; 2026 – Sábio Quiz</strong></p>
    </footer>
    <script src="script.js"></script>

</body>
</html>
